<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <style>
      .wordmark { font-family: Georgia, 'Times New Roman', serif; font-size: 38px; font-weight: 700; fill: #ffffff; letter-spacing: -0.5px; }
      .tagline  { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-weight: 400; fill: #9FE1CB; letter-spacing: 2.8px; }
      .subbrand { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 9.5px; font-weight: 400; fill: #ffffff; letter-spacing: 1.4px; opacity: 0.5; }
    </style>
  </defs>

  <!-- Background: Fidelity green -->
  <rect width="480" height="160" rx="16" fill="#006633"/>

  <!-- ── MARK ── centered at cx=76 cy=80 r=58 -->

  <!-- Outer orbital rings -->
  <circle cx="76" cy="80" r="58" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.14"/>
  <circle cx="76" cy="80" r="46" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.20"/>
  <circle cx="76" cy="80" r="34" fill="none" stroke="#ffffff" stroke-width="0.7" opacity="0.28"/>
  <circle cx="76" cy="80" r="23" fill="none" stroke="#ffffff" stroke-width="0.7" opacity="0.38"/>

  <!-- Accretion disk — gold ellipse crossing the horizon -->
  <ellipse cx="76" cy="80" rx="54" ry="10" fill="none" stroke="#C9A84C" stroke-width="2.2" opacity="0.95"/>
  <ellipse cx="76" cy="80" rx="54" ry="10" fill="none" stroke="#E4C46A" stroke-width="0.6" opacity="0.45"/>

  <!-- Event horizon -->
  <circle cx="76" cy="80" r="19" fill="#003d1f"/>
  <circle cx="76" cy="80" r="19" fill="none" stroke="#00A651" stroke-width="1.3" opacity="0.75"/>

  <!-- Photon ring -->
  <circle cx="76" cy="80" r="23" fill="none" stroke="#E4C46A" stroke-width="0.8" opacity="0.50"/>

  <!-- Singularity point -->
  <circle cx="76" cy="80" r="4.5" fill="#C9A84C"/>
  <circle cx="76" cy="80" r="2"   fill="#ffffff"/>

  <!-- ── WORDMARK ── -->
  <text class="wordmark" x="152" y="72">Singularity</text>

  <!-- Rule -->
  <line x1="152" y1="82" x2="450" y2="82" stroke="#ffffff" stroke-width="0.4" opacity="0.25"/>

  <!-- Tagline -->
  <text class="tagline" x="153" y="97">STORY ORCHESTRATION</text>

  <!-- Sub-brand -->
  <text class="subbrand" x="153" y="114">A FIDELITY ENGINEERING PLATFORM</text>
</svg>
