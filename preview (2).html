<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SingularityNeo - Combined Tabbed Views</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: rgba(15,23,42,0.84);
      --line: rgba(148,163,184,0.16);
      --text: #e5eefc;
      --muted: #9fb0c9;
      --accent: #60a5fa;
      --accent-2: #1d4ed8;
      --shadow: 0 18px 40px rgba(0,0,0,0.25);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(96,165,250,0.14), transparent 30%),
        radial-gradient(circle at top right, rgba(59,130,246,0.12), transparent 25%),
        linear-gradient(180deg, #08101d 0%, #0b1220 100%);
      color: var(--text);
    }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 18px;
      padding: 24px;
    }
    .hero {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 22px 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .hero h1 { margin: 0 0 8px; font-size: clamp(1.4rem, 2.8vw, 2rem); letter-spacing: -0.02em; }
    .hero p { margin: 0; color: var(--muted); line-height: 1.55; max-width: 980px; }
    .tabs-wrap { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .tab {
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(15, 23, 42, 0.85);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 999px;
      cursor: pointer;
      font: inherit;
      font-weight: 600;
      letter-spacing: 0.01em;
      transition: 160ms ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.16);
    }
    .tab:hover { transform: translateY(-1px); border-color: rgba(96,165,250,0.45); }
    .tab.active { background: linear-gradient(135deg, var(--accent-2), var(--accent)); color: white; border-color: transparent; }
    .viewer {
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .viewer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.14);
      background: rgba(8, 15, 28, 0.7);
    }
    .viewer-title { font-size: 1rem; font-weight: 700; letter-spacing: 0.01em; }
    .viewer-sub { color: var(--muted); font-size: 0.9rem; }
    iframe { width: 100%; height: calc(100vh - 220px); border: 0; background: white; }
    .actions { display:flex; gap:10px; align-items:center; }
    .link-btn {
      display:inline-flex; align-items:center; gap:8px; text-decoration:none; color:var(--text);
      border:1px solid rgba(148,163,184,0.18); padding:10px 12px; border-radius:12px; font-size:0.9rem;
      background:rgba(15,23,42,0.65);
    }
    .link-btn:hover { border-color: rgba(96,165,250,0.45); }
    @media (max-width: 720px) {
      .app { padding: 14px; gap: 14px; }
      .hero { padding: 18px; border-radius: 18px; }
      .viewer { border-radius: 18px; }
      .viewer-head { flex-direction: column; align-items: flex-start; }
      iframe { height: calc(100vh - 300px); }
      .tab { width: 100%; text-align: left; border-radius: 14px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <h1>SingularityNeo — Combined Architecture Views</h1>
      <p>All uploaded HTML pages are combined into one tabbed file. Each tab opens the original page in an isolated frame so styles and scripts do not interfere with each other.</p>
    </section>

    <section class="viewer">

        </div>
        <div class="actions">
          <a class="link-btn" id="openTab" href="#" target="_blank" rel="noopener">Open current tab alone</a>
        </div>
      </div>
      <iframe id="frame" title="Combined HTML view"></iframe>
    </section>
  </div>

    const tabs = document.getElementById('tabs');
    const frame = document.getElementById('frame');
    const viewerTitle = document.getElementById('viewerTitle');
    const viewerSub = document.getElementById('viewerSub');
    const openTab = document.getElementById('openTab');

    function b64ToDataUrl(b64) {
      return 'data:text/html;base64,' + b64;
    }

    function activate(key) {
      const doc = docs.find(d => d.key === key) || docs[0];
      [...tabs.querySelectorAll('.tab')].forEach(btn => {
        btn.classList.toggle('active', btn.dataset.key === doc.key);
        btn.setAttribute('aria-selected', btn.dataset.key === doc.key ? 'true' : 'false');
      });
      viewerTitle.textContent = doc.label;
      viewerSub.textContent = doc.title;
      const url = b64ToDataUrl(doc.b64);
      frame.src = url;
      openTab.href = url;
      try { localStorage.setItem('singularityneo-combined-tab', doc.key); } catch (e) {}
    }

    docs.forEach((doc, index) => {
      const btn = document.createElement('button');
      btn.className = 'tab';
      btn.type = 'button';
      btn.textContent = doc.label;
      btn.dataset.key = doc.key;
      btn.setAttribute('role', 'tab');
      btn.setAttribute('aria-selected', 'false');
      btn.addEventListener('click', () => activate(doc.key));
      tabs.appendChild(btn);
    });

    let initial = docs[0].key;
    try {
      const saved = localStorage.getItem('singularityneo-combined-tab');
      if (saved && docs.some(d => d.key === saved)) initial = saved;
    } catch (e) {}
    activate(initial);
  </script>
